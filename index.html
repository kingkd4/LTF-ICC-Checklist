<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICC Strategy Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #ffffff;
color: #5a1a3a;
font-family: ‘Montserrat’, sans-serif;
min-height: 100vh;
padding: 36px 16px 60px;
}

.container { max-width: 620px; margin: 0 auto; }

/* Header */
header { text-align: center; margin-bottom: 30px; }
.label { font-size: 10px; letter-spacing: 5px; color: #e991bc; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
h1 { font-family: ‘Cormorant Garamond’, serif; font-size: 44px; font-weight: 700; color: #d63384; line-height: 1; letter-spacing: 2px; }
.subtitle { font-size: 10px; color: #b48faa; margin-top: 6px; letter-spacing: 3px; font-weight: 500; }
.divider { width: 80px; height: 1.5px; background: linear-gradient(90deg, #fbc8dc, #d4a8f0, #a8c8f0); margin: 12px auto 0; border-radius: 99px; }
.heart { font-size: 18px; display: block; margin-top: 8px; }

/* Progress */
.progress-bar {
background: #ffffff;
border: 1.5px solid #f7c5dd;
border-radius: 18px; padding: 18px 22px; margin-bottom: 24px;
box-shadow: 0 4px 20px #f4a8cc20;
}
.progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-label { font-size: 10px; color: #c090aa; letter-spacing: 2px; font-weight: 700; }
.progress-count { font-size: 13px; font-weight: 700; color: #d63384; }
.bar-track { background: #fce8f2; border-radius: 99px; height: 7px; }
.bar-fill { height: 7px; border-radius: 99px; background: linear-gradient(90deg, #f4a8cc, #c9a0e8, #a0c4f4); transition: width 0.4s ease; }
.pct { font-family: ‘Cormorant Garamond’, serif; font-size: 16px; font-weight: 700; color: #d63384; margin-top: 8px; text-align: right; }

/* Tabs */
.tab-row { display: flex; gap: 10px; margin-bottom: 20px; }
.tab {
flex: 1; padding: 13px; border-radius: 14px;
border: 1.5px solid #f7c5dd; background: #ffffff;
color: #c090aa; font-family: ‘Montserrat’, sans-serif;
font-size: 11px; font-weight: 700; letter-spacing: 2px;
text-transform: uppercase; cursor: pointer; transition: all 0.25s;
box-shadow: 0 2px 10px #f4a8cc15;
}
.tab.active-buy {
background: #fff0f6;
border-color: #f4a8cc; color: #c2185b;
box-shadow: 0 4px 18px #f4a8cc30;
}
.tab.active-sell {
background: #f8f0ff;
border-color: #c9a0e8; color: #7b1fa2;
box-shadow: 0 4px 18px #c9a0e830;
}

/* Section */
.section {
background: #ffffff;
border: 1.5px solid #f7c5dd;
border-radius: 18px; margin-bottom: 12px;
overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
box-shadow: 0 2px 12px #f4a8cc12;
}
.section.complete { border-color: #90d4a0; box-shadow: 0 2px 16px #90d4a030; }
.section-header {
display: flex; align-items: center; gap: 10px;
padding: 14px 18px; border-bottom: 1.5px solid #fce8f2;
background: #fffafc;
}
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s; }
.section-title { font-family: ‘Cormorant Garamond’, serif; font-size: 18px; font-weight: 700; flex: 1; transition: color 0.3s; }
.done-tag { font-size: 9px; color: #43a047; letter-spacing: 2px; font-weight: 700; white-space: nowrap; }
.items { padding: 10px 14px 16px; }

/* Tip */
.tip {
background: #fff8fc;
border-left: 3px solid #f4a8cc;
border-radius: 0 10px 10px 0;
padding: 10px 14px; margin: 8px 10px 12px;
font-size: 13px; color: #b06890;
line-height: 1.7; font-style: italic;
font-family: ‘Cormorant Garamond’, serif;
}

/* Alert box */
.alert-box {
background: #fffbec;
border: 1.5px solid #fce08a;
border-radius: 10px; padding: 10px 14px;
margin: 6px 10px 12px; font-size: 11px;
color: #d47000; font-weight: 600; line-height: 1.6;
display: flex; gap: 8px; align-items: flex-start;
}

/* Candle sequence */
.candle-sequence {
background: #f8f2ff;
border: 1.5px solid #d4b0f0;
border-radius: 14px; padding: 16px 18px;
margin: 6px 10px 14px;
}
.candle-sequence-title {
font-size: 10px; font-weight: 700; letter-spacing: 2px;
color: #8e24aa; text-transform: uppercase; margin-bottom: 12px;
font-family: ‘Montserrat’, sans-serif;
}
.candle-steps { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.candle-step {
display: flex; flex-direction: column; align-items: center; gap: 4px;
background: #ffffff; border-radius: 10px; padding: 10px 12px;
border: 1.5px solid #f7c5dd; flex: 1; min-width: 80px;
box-shadow: 0 2px 8px #f4a8cc12;
}
.candle-step .num { font-size: 9px; font-weight: 700; color: #c090aa; letter-spacing: 1px; font-family: ‘Montserrat’, sans-serif; }
.candle-step .candle-icon { font-size: 22px; line-height: 1; }
.candle-step .candle-label { font-size: 10px; font-weight: 700; text-align: center; line-height: 1.4; font-family: ‘Montserrat’, sans-serif; }
.candle-arrow { font-size: 18px; color: #c9a0e8; flex-shrink: 0; }
.candle-step.entry-step { border-color: #f4a8cc; background: #fff0f6; }

/* Item */
.item {
display: flex; align-items: flex-start; gap: 12px;
padding: 10px 8px; border-radius: 10px;
cursor: pointer; transition: background 0.15s;
margin-bottom: 3px; user-select: none;
}
.item:hover { background: #fff5fb; }
.item.checked { background: #fdf8fb; }
.checkbox {
width: 20px; height: 20px; border-radius: 6px;
border: 1.5px solid #f7c5dd; flex-shrink: 0; margin-top: 2px;
display: flex; align-items: center; justify-content: center;
transition: all 0.2s; background: #ffffff;
}
.tick { display: none; color: #ffffff; font-size: 11px; font-weight: 900; }
.item.checked .tick { display: block; }
.item-text { font-size: 12px; line-height: 1.65; color: #7a3050; transition: all 0.2s; font-weight: 500; }
.item.checked .item-text { color: #c8a8b8; text-decoration: line-through; }
.item-why { font-size: 12px; color: #b890a8; margin-top: 4px; font-style: italic; line-height: 1.55; font-family: ‘Cormorant Garamond’, serif; transition: color 0.2s; }
.item.checked .item-why { color: #ddc8d4; }

/* Reset */
.reset-btn {
width: 100%; padding: 14px; border-radius: 14px;
border: 1.5px solid #f7c5dd; background: #ffffff;
color: #c090aa; font-family: ‘Montserrat’, sans-serif;
font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
cursor: pointer; margin-top: 8px; transition: all 0.2s; font-weight: 600;
box-shadow: 0 2px 10px #f4a8cc12;
}
.reset-btn:hover { border-color: #f4a8cc; color: #d63384; box-shadow: 0 4px 16px #f4a8cc25; }

.hidden { display: none; }
footer { text-align: center; font-size: 9px; color: #d4a8c0; margin-top: 20px; letter-spacing: 2px; }
</style>

let activeTab = 'buy';
let checked = { buy: {}, sell: {} };

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-buy').className = 'tab' + (tab === 'buy' ? ' active-buy' : '');
  document.getElementById('tab-sell').className = 'tab' + (tab === 'sell' ? ' active-sell' : '');
  document.getElementById('checklist-buy').className = tab === 'buy' ? '' : 'hidden';
  document.getElementById('checklist-sell').className = tab === 'sell' ? '' : 'hidden';
  updateProgress();
}

function toggle(tab, sIdx, iIdx) {
  const key = `${sIdx}-${iIdx}`;
  checked[tab][key] = !checked[tab][key];
  renderAll(tab);
  updateProgress();
}

function renderAll(tab) {
  const steps = tab === 'buy' ? buySteps : sellSteps;
  const list = document.getElementById(`checklist-${tab}`);
  list.innerHTML = '';
  steps.forEach((sec, si) => {
    const allDone = sec.items.every((_, ii) => checked[tab][`${si}-${ii}`]);
    const div = document.createElement('div');
    div.className = 'section' + (allDone ? ' complete' : '');

    const itemsHTML = sec.items.map((item, ii) => {
      const key = `${si}-${ii}`;
      const on = !!checked[tab][key];
      return `<div class="item${on ? ' checked' : ''}" onclick="toggle('${tab}',${si},${ii})">
        <div class="checkbox" style="${on ? `border-color:${sec.color};background:${sec.color}` : ''}">
          <span class="tick">✓</span>
        </div>
        <div style="flex:1">
          <div class="item-text">${item.text}</div>
          <div class="item-why">${item.why}</div>
        </div>
      </div>`;
    }).join('');

    const alertHTML = sec.alert ? `
      <div class="alert-box">
        <span style="font-size:16px;flex-shrink:0">⚡</span>
        <span>${sec.alert.replace('⚡ ','')}</span>
      </div>` : '';

    const seqHTML = sec.candleSeq === 'buy' ? candleSequenceBuy
                  : sec.candleSeq === 'sell' ? candleSequenceSell : '';

    div.innerHTML = `
      <div class="section-header">
        <div class="dot" style="background:${allDone ? '#66bb6a' : sec.color}"></div>
        <div class="section-title" style="color:${allDone ? '#43a047' : sec.color}">${sec.emoji} ${sec.title}</div>
        ${allDone ? '<span class="done-tag">✓ DONE 🌸</span>' : ''}
      </div>
      ${sec.tip ? `<div class="tip">${sec.tip}</div>` : ''}
      ${alertHTML}
      ${seqHTML}
      <div class="items">${itemsHTML}</div>`;
    list.appendChild(div);
  });
}

function getTotal(tab) {
  const steps = tab === 'buy' ? buySteps : sellSteps;
  return steps.reduce((a, s) => a + s.items.length, 0);
}

function updateProgress() {
  const total = getTotal(activeTab);
  const done = Object.values(checked[activeTab]).filter(Boolean).length;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById('count').textContent = `${done} / ${total}`;
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('pct').style.color = pct === 100 ? '#43a047' : '#d63384';
}

function resetAll() { checked[activeTab] = {}; renderAll(activeTab); updateProgress(); }

renderAll('buy'); renderAll('sell'); updateProgress();
</script>

</body>
</html>
